<style>
:root{
  --bg:#0e0e0f;--surface:#161618;--surface2:#1e1e21;--border:#2a2a2e;
  --accent:#e8ff47;--accent2:#ff6b35;--accent3:#47c8ff;
  --text:#f0f0f0;--muted:#666;--dim:#999;
  --green:#4ade80;--red:#ff4f4f;--hiit:#ff3cac;--yt:#ff0000;
  --purple:#a78bfa;--teal:#2dd4bf;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh;}
.ios-hint{display:none;background:color-mix(in srgb,var(--accent3) 10%,var(--bg));border-bottom:1px solid color-mix(in srgb,var(--accent3) 30%,transparent);padding:10px 16px;font-size:11px;color:var(--text);line-height:1.6;}
.ios-hint.show{display:block;}
.ios-hint strong{color:var(--accent3);}
.ios-x{float:right;background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;margin-left:8px;}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:10px;flex-wrap:wrap;}
.hdr-t{font-size:20px;font-weight:800;letter-spacing:2px;color:var(--accent);text-transform:uppercase;}
.hdr-s{font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-top:1px;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.wk-sel{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 9px;}
.wk-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:0 2px;}
.wk-btn:hover{color:var(--accent);}
.wk-num{font-family:monospace;font-size:12px;color:var(--accent);min-width:54px;text-align:center;}
.rst-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;}
.rst-btn:hover{border-color:var(--red);color:var(--red);}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 20px;}
.tab{padding:11px 16px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:5px;user-select:none;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tdot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0;display:inline-block;}
.tab.done-day .tdot{background:var(--green);}
.tbadge{font-family:monospace;font-size:10px;padding:1px 5px;border-radius:3px;background:var(--surface2);color:var(--muted);}
.tab.active .tbadge{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent);}
.main{padding:18px 20px;max-width:960px;}
.day-title{font-size:38px;font-weight:900;letter-spacing:3px;line-height:1;text-transform:uppercase;color:var(--text);}
.day-focus{font-size:11px;color:var(--muted);margin-top:3px;}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-top:6px;}
.badge-info{background:color-mix(in srgb,var(--accent3) 15%,transparent);color:var(--accent3);border:1px solid color-mix(in srgb,var(--accent3) 30%,transparent);}
.badge-warn{background:color-mix(in srgb,var(--accent2) 15%,transparent);color:var(--accent2);border:1px solid color-mix(in srgb,var(--accent2) 30%,transparent);}
.badge-teal{background:color-mix(in srgb,var(--teal) 15%,transparent);color:var(--teal);border:1px solid color-mix(in srgb,var(--teal) 30%,transparent);}
.stat-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 13px;text-align:center;min-width:66px;}
.stat-v{font-size:19px;font-weight:800;color:var(--accent);}
.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:1px;}
.prog-row{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 16px;margin:14px 0;display:flex;align-items:center;gap:12px;}
.prog-row>span{font-size:11px;color:var(--muted);white-space:nowrap;font-family:monospace;}
.bar-t{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.bar-f{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .35s ease;}
.how-box{background:color-mix(in srgb,var(--purple) 8%,transparent);border:1px solid color-mix(in srgb,var(--purple) 25%,transparent);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:color-mix(in srgb,var(--purple) 90%,var(--text));line-height:1.6;}
.how-box strong{color:var(--purple);}
.note-box{background:color-mix(in srgb,var(--accent2) 8%,transparent);border:1px solid color-mix(in srgb,var(--accent2) 25%,transparent);border-radius:8px;padding:9px 13px;margin-bottom:14px;font-size:11px;color:var(--accent2);line-height:1.5;}
.sat-box{background:color-mix(in srgb,var(--teal) 7%,transparent);border:1px solid color-mix(in srgb,var(--teal) 25%,transparent);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:color-mix(in srgb,var(--teal) 90%,var(--text));line-height:1.6;}
.sat-box strong{color:var(--teal);}
.circ-wrap{margin-bottom:6px;}
.circ-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px 10px 0 0;border-bottom:none;}
.circ-num{font-size:11px;font-weight:700;background:var(--accent);color:#000;padding:2px 7px;border-radius:4px;flex-shrink:0;}
.circ-num.sat{background:var(--teal);}
.circ-name{font-size:12px;font-weight:600;color:var(--text);flex:1;}
.circ-sub{font-size:11px;color:var(--muted);font-weight:400;}
.circ-rounds{font-family:monospace;font-size:10px;color:var(--dim);}
.done-badge{display:none;font-size:10px;color:var(--green);font-weight:600;}
.circ-wrap.all-done .done-badge{display:inline;}
.circ-exs{border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;}
.ex-row{display:grid;grid-template-columns:36px 1fr auto auto;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.ex-row:last-child{border-bottom:none;}
.ex-row.done-ex{background:color-mix(in srgb,var(--green) 5%,var(--surface));}
.ex-row.burst-row{background:color-mix(in srgb,var(--hiit) 6%,var(--surface));}
.ex-row.burst-row.done-ex{background:color-mix(in srgb,var(--hiit) 10%,var(--surface));}
.ex-row.done-ex .ex-name{text-decoration:line-through;color:var(--dim);}
.chk-col{display:flex;align-items:center;justify-content:center;padding:12px 0 12px 12px;}
.chk-box{width:19px;height:19px;border:2px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.ex-row.done-ex .chk-box{background:var(--green);border-color:var(--green);}
.chk-mark{color:#000;font-size:12px;font-weight:700;display:none;}
.ex-row.done-ex .chk-mark{display:block;}
.ex-info{padding:10px 8px;}
.burst-label{font-size:9px;font-weight:700;color:var(--hiit);letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px;}
.ex-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;}
.ex-meta{font-size:10px;color:var(--muted);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.ex-tag{background:var(--surface2);padding:1px 6px;border-radius:3px;font-size:10px;font-family:monospace;color:var(--dim);border:1px solid var(--border);}
.ex-tag.m{color:var(--accent3);border-color:color-mix(in srgb,var(--accent3) 20%,transparent);}
.ex-tag.eq{color:var(--purple);border-color:color-mix(in srgb,var(--purple) 25%,transparent);}
.ex-tag.bw{color:var(--teal);border-color:color-mix(in srgb,var(--teal) 25%,transparent);}
.ex-tip{font-size:10px;color:var(--muted);margin-top:3px;font-style:italic;line-height:1.4;}
.yt-col{display:flex;align-items:center;padding:0 5px;}
.yt-btn{display:flex;align-items:center;gap:3px;background:color-mix(in srgb,var(--yt) 10%,transparent);border:1px solid color-mix(in srgb,var(--yt) 28%,transparent);color:color-mix(in srgb,var(--yt) 80%,var(--text));font-size:10px;font-weight:600;padding:4px 7px;border-radius:5px;cursor:pointer;white-space:nowrap;text-decoration:none;}
.yt-btn:hover{background:color-mix(in srgb,var(--yt) 20%,transparent);color:#fff;}
.w-col{display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 12px;}
.w-col label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.w-input{background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:monospace;font-size:11px;padding:4px 5px;width:60px;text-align:center;outline:none;transition:border-color .15s;}
.w-input:focus{border-color:var(--accent);}
.w-input::placeholder{color:var(--muted);font-size:10px;}
.w-input.pre{border-color:color-mix(in srgb,var(--accent) 40%,transparent);color:var(--accent);}
.rest-div{display:flex;align-items:center;gap:10px;padding:5px 0;margin:3px 0;}
.r-line{flex:1;height:1px;background:var(--border);}
.r-lbl{font-size:10px;color:var(--muted);font-family:monospace;white-space:nowrap;}
.r-btn{font-size:10px;font-weight:600;padding:3px 9px;border-radius:5px;cursor:pointer;background:color-mix(in srgb,var(--accent3) 10%,transparent);border:1px solid color-mix(in srgb,var(--accent3) 25%,transparent);color:var(--accent3);white-space:nowrap;}
.r-btn.running{background:color-mix(in srgb,var(--accent3) 20%,transparent);color:#fff;}
.cardio-card{margin-top:18px;background:linear-gradient(135deg,color-mix(in srgb,var(--accent3) 8%,transparent),color-mix(in srgb,var(--accent) 5%,transparent));border:1px solid color-mix(in srgb,var(--accent3) 25%,transparent);border-radius:10px;padding:13px 16px;display:flex;align-items:flex-start;gap:11px;}
.cardio-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.cardio-body h4{font-size:12px;font-weight:600;color:var(--accent3);margin-bottom:3px;}
.cardio-body p{font-size:11px;color:var(--muted);line-height:1.5;}
.week-ov{margin-top:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.week-ov h3{font-size:16px;font-weight:700;letter-spacing:1px;color:var(--accent);margin-bottom:11px;text-transform:uppercase;}
.wk-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.wk-cell{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 7px;text-align:center;}
.wk-cell.done{border-color:color-mix(in srgb,var(--green) 40%,transparent);background:color-mix(in srgb,var(--green) 5%,transparent);}
.wk-cell .wd{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--muted);}
.wk-cell.done .wd{color:var(--green);}
.wk-cell .wp{font-family:monospace;font-size:10px;color:var(--muted);margin-top:2px;}
.wk-cell .wb{height:3px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;}
.wk-cell .wbf{height:100%;background:var(--green);border-radius:2px;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
@media(max-width:580px){
  .hdr{padding:11px 14px;}
  .tabs{padding:0 14px;}
  .main{padding:14px 14px;}
  .day-title{font-size:30px;}
  .wk-grid{grid-template-columns:repeat(3,1fr);}
  .w-input{width:52px;}
}
</style>
</head>

function allIds(day){var ids=[];day.circuits.forEach(function(c){c.exs.forEach(function(e){ids.push(e.id);});});return ids;}
function doneCount(day){var ids=allIds(day);return ids.filter(function(id){return ST[id]&&ST[id].checked;}).length;}

function renderTabs(){
  var el=document.getElementById('tabBar');
  el.innerHTML=DAYS.map(function(d,i){
    var t=allIds(d).length,dn=doneCount(d),allDone=dn===t&&t>0;
    return '<div class="tab'+(i===currentDay?' active':'')+(allDone?' done-day':'')+'" onclick="switchDay('+i+')">' +
      '<span class="tdot"></span>'+d.label+'<span class="tbadge">'+d.short+'</span></div>';
  }).join('');
}

function renderDay(){
  var day=DAYS[currentDay],ds=ST;
  var ids=allIds(day);
  var done=ids.filter(function(id){return ds[id]&&ds[id].checked;}).length;
  var total=ids.length;
  var pct=total>0?Math.round((done/total)*100):0;
  var restSecs=day.isSat?60:70;
  var html='';

  html+='<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:12px;">';
  html+='<div><div class="day-title">'+day.label+'</div>';
  html+='<div class="day-focus">'+day.type+' &nbsp;·&nbsp; '+day.focus+'</div>';
  html+='<span class="badge '+day.badgeClass+'">'+day.type+'</span></div>';
  html+='<div class="stat-row">';
  html+='<div class="stat"><div class="stat-v" id="doneChip">'+done+'/'+total+'</div><div class="stat-l">Done</div></div>';
  html+='<div class="stat"><div class="stat-v">'+day.circuits.length+'</div><div class="stat-l">Circuits</div></div>';
  html+='</div></div>';

  html+='<div class="prog-row"><span id="progTxt">'+done+' of '+total+'</span>';
  html+='<div class="bar-t"><div class="bar-f" id="barFill" style="width:'+pct+'%"></div></div>';
  html+='<span style="font-size:11px;color:var(--muted);font-family:monospace;min-width:30px;text-align:right;" id="pctLbl">'+pct+'%</span></div>';

  var boxClass=day.isSat?'sat-box':'how-box';
  html+='<div class="'+boxClass+'"><strong>How this works:</strong> '+day.how+'</div>';
  if(day.note) html+='<div class="note-box">&#9888;&#65039; '+day.note+'</div>';

  var cNum=0;
  day.circuits.forEach(function(c,ci){
    cNum++;
    var allDoneC=c.exs.every(function(e){return ds[e.id]&&ds[e.id].checked;});
    var numCls=day.isSat?'circ-num sat':'circ-num';

    html+='<div class="circ-wrap'+(allDoneC?' all-done':'')+'" id="cw_'+c.id+'">';
    html+='<div class="circ-hdr">';
    html+='<span class="'+numCls+'">C'+cNum+'</span>';
    html+='<span class="circ-name">'+c.name+' <span class="circ-sub">— '+c.sub+'</span></span>';
    html+='<span class="circ-rounds">'+c.rounds+'</span>';
    html+='<span class="done-badge">&#10003; Done</span>';
    html+='</div>';
    html+='<div class="circ-exs">';

    c.exs.forEach(function(ex,ei){
      var exSt=ds[ex.id]||{};
      var checked=!!exSt.checked;
      var thisW=exSt.weight||'',defW=WD[ex.id]||'',dispW=thisW||defW,isPre=!thisW&&!!defW;
      var isBurst=!!ex.isBurst,isBW=!!ex.isBW;
      var last=ei===c.exs.length-1;
      var rowCls='ex-row'+(checked?' done-ex':'')+(isBurst?' burst-row':'');

      html+='<div class="'+rowCls+'" id="er_'+ex.id+'" onclick="toggleEx(\''+ex.id+'\',\''+c.id+'\')">';
      html+='<div class="chk-col"><div class="chk-box"><span class="chk-mark">&#10003;</span></div></div>';
      html+='<div class="ex-info">';
      if(isBurst) html+='<div class="burst-label">Cardio burst</div>';
      html+='<div class="ex-name">'+ex.name+'</div>';
      html+='<div class="ex-meta"><span>'+ex.sets+'</span>';
      html+='<span class="ex-tag m">'+ex.muscle+'</span>';
      html+='<span class="ex-tag '+(ex.eqC||'')+'">'+ex.eq+'</span></div>';
      if(ex.tip) html+='<div class="ex-tip">'+ex.tip+'</div>';
      html+='</div>';
      html+='<div class="yt-col" onclick="event.stopPropagation()">';
      html+='<a class="yt-btn" href="'+ytUrl(ex.ytQ)+'" target="_blank" rel="noopener noreferrer">'+YT_SVG+' Watch</a></div>';
      html+='<div class="w-col" onclick="event.stopPropagation()">';
      if(!isBW){
        html+='<label>'+(isPre?'Last:':'Weight')+'</label>';
        html+='<input class="w-input'+(isPre?' pre':'')+'" id="wi_'+ex.id+'" placeholder="lbs" value="'+dispW+'" oninput="onW(\''+ex.id+'\',this)">';
      } else {
        html+='<div style="width:60px;"></div>';
      }
      html+='</div>';
      html+='</div>';
    });

    html+='</div></div>';

    if(ci<day.circuits.length-1){
      var rid='rest_'+day.id+'_'+ci;
      html+='<div class="rest-div"><div class="r-line"></div>';
      html+='<span class="r-lbl">'+restSecs+'s rest</span>';
      html+='<button class="r-btn" id="rb_'+rid+'" onclick="startTimer(\''+rid+'\','+restSecs+')">&#9654; Timer</button>';
      html+='<div class="r-line"></div></div>';
    }
  });

  html+='<div class="cardio-card"><div class="cardio-icon">&#128675;</div>';
  html+='<div class="cardio-body"><h4>Post-Workout Cardio — GROW Rower (10 min)</h4>';
  html+='<p>'+(day.isSat?'Attach GROW Rower to low pulley. Row at easy conversational pace — active cooldown. Legs first, lean back, pull arms. ~20 spm.':'Attach GROW Rower after circuits. Row 10 min steady pace. Legs → lean back → pull arms. Seals the calorie burn. ~22 spm.')+'</p></div></div>';

  html+='<div class="week-ov"><h3>Week '+currentWeek+' Overview</h3><div class="wk-grid">';
  DAYS.forEach(function(d){
    var ids2=allIds(d);
    var dn2=ids2.filter(function(id){return ST[id]&&ST[id].checked;}).length;
    var pct2=ids2.length>0?Math.round((dn2/ids2.length)*100):0;
    var allDone2=dn2===ids2.length&&ids2.length>0;
    html+='<div class="wk-cell'+(allDone2?' done':'')+'"><div class="wd">'+d.short+'</div>';
    html+='<div class="wp">'+dn2+'/'+ids2.length+'</div>';
    html+='<div class="wb"><div class="wbf" style="width:'+pct2+'%"></div></div></div>';
  });
  html+='</div></div>';

  document.getElementById('mainContent').innerHTML=html;
}

function render(){renderTabs();renderDay();}

function switchDay(i){
  Object.keys(timers).forEach(function(k){clearInterval(timers[k]);});
  timers={};currentDay=i;render();
}

function toggleEx(exId,circId){
  if(!ST[exId]) ST[exId]={};
  ST[exId].checked=!ST[exId].checked;
  saveSt();
  var row=document.getElementById('er_'+exId);
  if(row){
    var day=DAYS[currentDay],ex=null;
    day.circuits.forEach(function(c){c.exs.forEach(function(e){if(e.id===exId) ex=e;});});
    var checked=ST[exId].checked;
    row.classList.toggle('done-ex',checked);
    var nameEl=row.querySelector('.ex-name');
    if(nameEl){nameEl.style.textDecoration=checked?'line-through':'none';nameEl.style.color=checked?'var(--dim)':'var(--text)';}
  }
  var cw=document.getElementById('cw_'+circId);
  if(cw){
    var day2=DAYS[currentDay],circ=null;
    day2.circuits.forEach(function(c){if(c.id===circId) circ=c;});
    if(circ){
      var allDone=circ.exs.every(function(e){return ST[e.id]&&ST[e.id].checked;});
      cw.classList.toggle('all-done',allDone);
    }
  }
  var ids=allIds(DAYS[currentDay]);
  var done=ids.filter(function(id){return ST[id]&&ST[id].checked;}).length;
  var total=ids.length;
  var pct=total>0?Math.round((done/total)*100):0;
  var bf=document.getElementById('barFill'),pl=document.getElementById('pctLbl');
  var dc=document.getElementById('doneChip'),pt=document.getElementById('progTxt');
  if(bf) bf.style.width=pct+'%';
  if(pl) pl.textContent=pct+'%';
  if(dc) dc.textContent=done+'/'+total;
  if(pt) pt.textContent=done+' of '+total;
  renderTabs();
}

function onW(exId,el){
  var val=el.value;
  if(!ST[exId]) ST[exId]={};
  ST[exId].weight=val;
  saveSt();
  if(val){WD[exId]=val;lsSet(DEF_KEY,WD);}
  el.classList.remove('pre');
  var lbl=el.previousElementSibling;
  if(lbl&&lbl.tagName==='LABEL') lbl.textContent='Weight';
}

function startTimer(rid,secs){
  var btn=document.getElementById('rb_'+rid);
  if(!btn) return;
  if(timers[rid]){clearInterval(timers[rid]);delete timers[rid];btn.classList.remove('running');btn.textContent='&#9654; Timer';return;}
  var rem=secs;
  btn.classList.add('running');btn.textContent='&#9646;&#9646; '+rem+'s';
  timers[rid]=setInterval(function(){
    rem--;
    if(rem<=0){
      clearInterval(timers[rid]);delete timers[rid];
      btn.classList.remove('running');btn.textContent='Go!';
      setTimeout(function(){btn.textContent='&#9654; Timer';},3000);
    } else {btn.textContent='&#9646;&#9646; '+rem+'s — tap to stop';}
  },1000);
}

function changeWeek(dir){
  Object.keys(timers).forEach(function(k){clearInterval(timers[k]);});
  timers={};currentWeek=Math.max(1,currentWeek+dir);
  document.getElementById('wkLbl').textContent='WEEK '+currentWeek;
  loadSt();render();
}

function confirmReset(){
  if(confirm('Reset checkmarks for Week '+currentWeek+'? Weight history is kept.')){
    var kept={};
    Object.keys(ST).forEach(function(k){if(ST[k]&&ST[k].weight) kept[k]={weight:ST[k].weight};});
    ST=kept;saveSt();render();
  }
}

(function(){
  var isIos=/iphone|ipad|ipod/i.test(navigator.userAgent);
  var isStandalone=window.navigator.standalone===true;
  if(isIos&&!isStandalone&&!sessionStorage.getItem('iosDismissed')){
    document.getElementById('iosHint').classList.add('show');
  }
})();

render();
</script>
